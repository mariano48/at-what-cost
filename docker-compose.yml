services:
  postgres:
    image: postgres:16
    container_name: at-what-cost-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: labs
      POSTGRES_PASSWORD: labs
      POSTGRES_DB: labs
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U labs']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: at-what-cost-redis
    restart: unless-stopped
    ports:
      - '6380:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
